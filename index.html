<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GSAT™ Governance Stress Test</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: #08111f;
      color: #edf3ff;
    }

    .container {
      max-width: 1300px;
      margin: auto;
      padding: 50px 20px;
    }

    h1 {
      font-size: 44px;
      margin-bottom: 5px;
    }

    .sub {
      color: #9cb0d0;
      margin-bottom: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }

    .panel {
      background: #0d1728;
      padding: 30px;
      border-radius: 16px;
    }

    label {
      display: block;
      margin-top: 18px;
      font-size: 14px;
      color: #9cb0d0;
    }

    input[type="range"] {
      width: 100%;
    }

    .score {
      font-size: 56px;
      font-weight: bold;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 10px;
      margin-top: 10px;
      margin-right: 8px;
      background: #1a2742;
    }

    .result {
      margin-top: 20px;
      font-size: 16px;
      color: #9cb0d0;
      line-height: 1.5;
    }

    .section-title {
      font-size: 20px;
      margin-bottom: 10px;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>GSAT™ Governance Stress Test</h1>
    <div class="sub">Governance Stress Assessment & Transmission</div>

    <div class="grid">
      <div class="panel">
        <div class="section-title">Core Governance Inputs</div>

        <label for="esc">Escalation Effectiveness</label>
        <input type="range" min="1" max="5" value="3" id="esc" />

        <label for="cap">Capital & Clearing Integration</label>
        <input type="range" min="1" max="5" value="3" id="cap" />

        <label for="dep">Dependency Exposure</label>
        <input type="range" min="1" max="5" value="3" id="dep" />

        <label for="prod">Product & Structural Governance</label>
        <input type="range" min="1" max="5" value="3" id="prod" />

        <label for="dec">Decision Authority</label>
        <input type="range" min="1" max="5" value="3" id="dec" />
      </div>

      <div class="panel">
        <div class="section-title">Supervisory Output</div>

        <div class="score" id="score">15</div>

        <div class="badge" id="grr">GRR-C (Vulnerable)</div>
        <div class="badge" id="trm">TRM: Moderate</div>

        <div class="result" id="text">
          Governance remains functional but shows pressure under stress.
        </div>
      </div>
    </div>
  </div>

  <script>
    function calc() {
      const esc = Number(document.getElementById("esc").value);
      const cap = Number(document.getElementById("cap").value);
      const dep = Number(document.getElementById("dep").value);
      const prod = Number(document.getElementById("prod").value);
      const dec = Number(document.getElementById("dec").value);

      const score = esc + cap + dep + prod + dec;
      document.getElementById("score").textContent = score;

      let grr = "";
      if (score >= 21) grr = "GRR-A (Strong)";
      else if (score >= 16) grr = "GRR-B (Adequate)";
      else if (score >= 11) grr = "GRR-C (Vulnerable)";
      else grr = "GRR-D (Deficient)";

      document.getElementById("grr").textContent = grr;

      const trm = dep >= 4 ? "High" : dep >= 3 ? "Moderate" : "Low";
      document.getElementById("trm").textContent = "TRM: " + trm;

      let text = "";
      if (score >= 21) {
        text = "Governance is strong and resilient under stress.";
      } else if (score >= 16) {
        text = "Governance remains functional but shows pressure under stress.";
      } else if (score >= 11) {
        text = "Governance is vulnerable and may fail under stress conditions.";
      } else {
        text = "Governance is structurally deficient.";
      }

      document.getElementById("text").textContent = text;
    }

    document.querySelectorAll('input[type="range"]').forEach((el) => {
      el.addEventListener("input", calc);
    });

    calc();
  </script>
</body>
</html>
